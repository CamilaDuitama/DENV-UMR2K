name: denv-umr2k
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - biopython>=1.83
  - pandas>=2.2
  - requests>=2.31
  - tqdm
  - pyyaml
  - openpyxl          # Excel metadata export
  - plotly>=5.20      # interactive plots for GitHub Pages
  - kaleido           # static image export from plotly
  - zstandard         # decompress Nextstrain .tsv.zst files
  - jupyter
  - ipykernel
  # Sequence handling
  # mafft loaded via: module load mafft
  - fasttree          # quick tree for QC
  # Web / GitHub Pages
  - jinja2            # template rendering for the static site
  - pip:
    - nextstrain-cli  # optional: pull nextstrain builds
